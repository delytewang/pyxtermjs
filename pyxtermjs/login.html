<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Login - pyxterm.js</title>
    <style>
      html {
        font-family: arial;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f5f5;
      }

      form {
        width: 320px;
        padding: 24px;
        background: white;
        border: 1px solid #ddd;
        border-radius: 6px;
      }

      h1 {
        margin: 0 0 20px;
        font-size: 1.4em;
      }

      label {
        display: block;
        margin-top: 12px;
        font-size: small;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 4px;
        padding: 8px;
        border: 1px solid #bbb;
        border-radius: 4px;
      }

      button {
        width: 100%;
        margin-top: 20px;
        padding: 8px;
        border: 1px solid #111;
        border-radius: 4px;
        background: #111;
        color: white;
        cursor: pointer;
      }

      .error {
        margin: 0 0 12px;
        padding: 8px;
        background: #ffd7d7;
        color: #740000;
        font-size: small;
      }
    </style>
  </head>
  <body>
    <form method="post" action="{{ url_for('login') }}">
      <h1>pyxterm.js login</h1>
      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" autofocus />

      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        autocomplete="current-password"
      />

      <button type="submit">Log in</button>
    </form>
  </body>
</html>
